name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: runs on every PR and push ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q

  # ── CD: deploy to GCE VM over SSH (main only) ──────────────────────────────
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GCE over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -e
            SRC_DIR="${{ secrets.SRC_DIR }}"
            COMPOSE_FILE="${{ secrets.COMPOSE_FILE }}"
            APP_USER="${{ secrets.APP_USER }}"

            sudo -u "$APP_USER" git -C "$SRC_DIR" fetch --all
            sudo -u "$APP_USER" git -C "$SRC_DIR" pull --ff-only

            sudo docker compose -f "$COMPOSE_FILE" up -d --build api

            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:8000/health >/dev/null; then
                echo "health ok"
                exit 0
              fi
              sleep 2
            done
            echo "health check failed"
            sudo docker compose -f "$COMPOSE_FILE" ps
            exit 1
