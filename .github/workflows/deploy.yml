name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: runs on every PR and push ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Only collect tests/ — app/routers/*_test.py are FastAPI routers, not pytest.
        run: pytest -q tests/ -o asyncio_mode=auto

  # ── CD: deploy to GCE VM over SSH (main only) ──────────────────────────────
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCE over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            SRC_DIR="${{ secrets.SRC_DIR }}"
            COMPOSE_DIR="${{ secrets.COMPOSE_DIR }}"
            APP_USER="${{ secrets.APP_USER }}"

            sudo -u "$APP_USER" git -C "$SRC_DIR" fetch --all --prune
            sudo -u "$APP_USER" git -C "$SRC_DIR" checkout main
            sudo -u "$APP_USER" git -C "$SRC_DIR" pull --ff-only origin main

            cd "$COMPOSE_DIR"
            sudo docker compose up -d --build api

            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:8000/health >/dev/null; then
                echo "health ok"
                exit 0
              fi
              sleep 2
            done
            echo "health check failed"
            sudo docker compose ps
            exit 1
