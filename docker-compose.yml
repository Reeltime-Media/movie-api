services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Prefer pooler URL — direct db.* host often times out from Docker (IPv6 / routing).
    environment:
      - POOLER_DATABASE_URL=${POOLER_DATABASE_URL:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --loop asyncio
    volumes:
      - .:/app

  transcode:
    build:
      context: .
      dockerfile: transcode_service/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=${TRANSCODE_DATABASE_URL}
    depends_on:
      - api
